<!-- templates/login.html -->
{% extends "base.html" %}

{% block title %}登录 - 用工申请管理系统{% endblock %}

{% block header %}
<h1 class="mb-4">
    <i class="fas fa-sign-in-alt"></i> 用户登录
</h1>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-user"></i> 请输入登录信息
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                        <div class="mt-2">
                            <button type="button" class="btn btn-link p-0 text-primary text-decoration-underline" 
                                    data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
                                <i class="fas fa-key me-1"></i>忘记密码？
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">记住我</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                    </div>
                </form>

                <div class="mt-4 pt-4 border-top">
                    <p class="text-center text-muted mb-2">还没有账号？</p>
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-outline-primary" 
                                data-bs-toggle="modal" data-bs-target="#registerModal">
                            <i class="fas fa-user-plus"></i> 注册新账号
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 忘记密码模态框 -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">
                    <i class="fas fa-key me-2"></i>忘记密码
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    如需重置密码，请联系系统管理员。
                </div>
                <p class="text-muted small mt-3">
                    管理员联系方式：<br>
                    电话：138-xxxx-xxxx<br>
                    邮箱：admin@example.com
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    <i class="fas fa-check"></i> 知道了
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 注册模态框 -->
<div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="fas fa-user-plus me-2"></i>注册新账号
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="reg_username" class="form-label">用户名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="reg_username" name="username" required placeholder="3-20位字母或数字">
                    </div>
                    <div class="mb-3">
                        <label for="reg_display_name" class="form-label">显示名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="reg_display_name" name="display_name" required placeholder="请输入真实姓名">
                    </div>
                    <div class="mb-3">
                        <label for="reg_email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="reg_email" name="email" placeholder="user@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="reg_department" class="form-label">部门</label>
                        <input type="text" class="form-control" id="reg_department" name="department" placeholder="请输入部门名称">
                    </div>
                    <div class="mb-3">
                        <label for="reg_password" class="form-label">密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="reg_password" name="password" required placeholder="至少8位，包含大小写字母和数字">
                    </div>
                    <div class="mb-3">
                        <label for="reg_confirm_password" class="form-label">确认密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="reg_confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                    </div>
                    <div class="mb-3">
                        <label for="reg_captcha" class="form-label">验证码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="reg_captcha" name="captcha" required placeholder="请输入验证码" maxlength="4">
                            <button type="button" class="btn btn-outline-secondary" id="refreshCaptchaBtn">
                                <i class="fas fa-refresh"></i>
                            </button>
                        </div>
                        <div class="mt-2">
                            <span class="badge bg-secondary text-white" id="captchaDisplay" style="font-size: 1.2rem; letter-spacing: 0.3em; padding: 0.5rem 1rem;"></span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="fas fa-times"></i> 取消
                </button>
                <button type="button" class="btn btn-primary" id="submitRegisterBtn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// 等待页面完全加载后绑定事件
document.addEventListener('DOMContentLoaded', function() {
    // 获取验证码
    function loadCaptcha() {
        fetch('/api/captcha')
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            if (data.success) {
                document.getElementById('captchaDisplay').textContent = data.captcha;
            }
        })
        .catch(function(error) {
            console.error('获取验证码失败:', error);
        });
    }

    // 刷新验证码按钮
    document.getElementById('refreshCaptchaBtn').addEventListener('click', function() {
        loadCaptcha();
    });

    // 注册模态框显示时加载验证码
    var registerModal = document.getElementById('registerModal');
    registerModal.addEventListener('show.bs.modal', function() {
        loadCaptcha();
    });

    // 注册功能
    document.getElementById('submitRegisterBtn').addEventListener('click', function() {
        var password = document.getElementById('reg_password').value;
        var confirmPassword = document.getElementById('reg_confirm_password').value;
        
        if (password !== confirmPassword) {
            alert('两次输入的密码不一致！');
            return;
        }
        
        if (password.length < 8) {
            alert('密码长度不能少于8位！');
            return;
        }
        
        var data = {
            username: document.getElementById('reg_username').value,
            display_name: document.getElementById('reg_display_name').value,
            email: document.getElementById('reg_email').value,
            department: document.getElementById('reg_department').value,
            password: password,
            captcha: document.getElementById('reg_captcha').value
        };
        
        fetch('/api/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(function(response) {
            return response.json();
        })
        .then(function(response) {
            if (response.success) {
                alert('注册成功！');
                var modal = bootstrap.Modal.getInstance(document.getElementById('registerModal'));
                modal.hide();
                document.getElementById('registerForm').reset();
                loadCaptcha(); // 刷新验证码
            } else {
                alert('注册失败：' + response.message);
                loadCaptcha(); // 刷新验证码
            }
        })
        .catch(function(error) {
            alert('网络错误，请稍后重试！');
            console.error('Error:', error);
        });
    });
});
</script>
{% endblock %}
